name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # release.yml calls this via `uses: ./.github/workflows/ci.yml`
  # so stable releases run the exact same matrix as per-PR CI.
  workflow_call: {}

# Force JavaScript-based actions to run on Node 24 instead of the deprecated Node 20 ahead of
# the 2026-06-16 hard cutover, until we bump each action to a Node-24-native major version.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  JWASM_VERSION: v2.20

jobs:
  test:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0                          # version.pl needs full history

      # JWasm is not packaged for either OS: built from source on linux,
      # official prebuilt binary on windows. DOSBox runs the behavioral suite.
      - name: Set up toolchain (JWasm + DOSBox)
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y dosbox
            git clone --depth 1 --branch "$JWASM_VERSION" https://github.com/Baron-von-Riedesel/JWasm.git "$RUNNER_TEMP/JWasm"
            make -C "$RUNNER_TEMP/JWasm" -f GccUnix.mak
            sudo install "$(find "$RUNNER_TEMP/JWasm/build" -name jwasm -type f)" /usr/local/bin/jwasm
            jwasm -h | head -3 || true
          else
            ASSET="JWasm_$(echo "$JWASM_VERSION" | tr -d .)_win32.zip"
            curl -sL -o "$RUNNER_TEMP/jwasm.zip" "https://github.com/Baron-von-Riedesel/JWasm/releases/download/$JWASM_VERSION/$ASSET"
            mkdir -p "$RUNNER_TEMP/jwasm"
            unzip -oq "$RUNNER_TEMP/jwasm.zip" -d "$RUNNER_TEMP/jwasm"
            echo "$RUNNER_TEMP/jwasm" >> "$GITHUB_PATH"
            choco install -y --no-progress make dosbox
            "$RUNNER_TEMP/jwasm/JWasm.exe" -h | head -3 || true   # GITHUB_PATH applies from the NEXT step on
          fi

      - name: Build
        shell: bash
        run: make

      # REQUIRED tier -- the DOSBox suite runs headless and deterministic here.
      - name: Test (DOSBox behavioral suite)
        if: runner.os == 'Linux'
        shell: bash
        run: make test

      # ADVISORY tier -- DOSBox on a windows runner needs a usable desktop
      # session and is best-effort; a flake here never blocks a merge.
      - name: Test (DOSBox behavioral suite, advisory)
        if: runner.os == 'Windows'
        continue-on-error: true
        shell: bash
        run: make test

      - name: Upload test session output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-${{ matrix.os }}
          path: tests/work/*.TXT
          if-no-files-found: ignore

      - name: Upload binary
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: COLTSR
          path: COLTSR.COM
